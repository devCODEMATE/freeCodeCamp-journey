<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Form</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <form id="application-form" action="#">
        <h1>Apply for a Role</h1>
        <p class="hint">Fill this out and we’ll get back to you soon.</p>

        <div class="field">
          <label for="name">Full Name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="e.g., Jordan Lee"
            required
            minlength="2"
          />
        </div>

        <div class="field">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="e.g., jordan@email.com"
            required
          />
        </div>

        <div class="field">
          <label for="position">Position</label>
          <select id="position" name="position" required>
            <option value="" selected disabled>Select a position…</option>
            <option value="frontend">Frontend Developer</option>
            <option value="backend">Backend Developer</option>
            <option value="designer">Product Designer</option>
            <option value="pm">Project Manager</option>
          </select>
        </div>

        <fieldset class="radio-group">
          <legend>Availability</legend>

          <div class="radio-row">
            <input
              type="radio"
              id="full-time"
              name="availability"
              value="full-time"
              required
            />
            <label for="full-time">Full-Time</label>
          </div>

          <div class="radio-row">
            <input
              type="radio"
              id="part-time"
              name="availability"
              value="part-time"
            />
            <label for="part-time">Part-Time</label>
          </div>

          <div class="radio-row">
            <input
              type="radio"
              id="contract"
              name="availability"
              value="contract"
            />
            <label for="contract">Contract</label>
          </div>
        </fieldset>

        <div class="field">
          <label for="message">Message</label>
          <textarea
            id="message"
            name="message"
            placeholder="Tell us a bit about your experience…"
            required
            minlength="10"
          ></textarea>
        </div>

        <button type="submit">Submit Application</button>
      </form>
    </div>
  </body>
</html>
