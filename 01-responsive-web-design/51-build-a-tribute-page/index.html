          <section id="tribute-info">
    <h2>Life & Career Timeline</h2>
    <ul>
      <li><strong>1926</strong> — Born Norma Jeane Mortenson in Los Angeles.</li>
      <li><strong>1942</strong> — Marries Jimmy Dougherty at age 16.</li>
      <li><strong>1945</strong> — Discovered by U.S. Army photographer David Conover.</li>
      <li><strong>1946</strong> — First national magazine cover; signs first contract with 20th Century Fox as “Marilyn Monroe”.</li>
      <li><strong>1950</strong> — <em>The Asphalt Jungle</em> released.</li>
      <li><strong>1953</strong> — <em>Gentlemen Prefer Blondes</em> & <em>How to Marry a Millionaire</em> released; becomes first Playboy centerfold.</li>
      <li><strong>1954</strong> — Marries Joe DiMaggio; performs for troops in Korea; films skirt scene for <em>The Seven Year Itch</em>.</li>
      <li><strong>1956</strong> — Marries Arthur Miller; <em>Bus Stop</em> released.</li>
      <li><strong>1959</strong> — <em>Some Like It Hot</em> released.</li>
      <li><strong>1962</strong> — “Last Sitting” for Vogue; last interview for LIFE; dies at 36.</li>
    </ul>
  </section>
