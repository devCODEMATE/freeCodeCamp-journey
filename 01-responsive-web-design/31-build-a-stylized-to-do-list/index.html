<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Styled To-Do List</title>
    <link ref="stylesheet" href="styles.css">
</head>

<body>
    <h1>My To-Do List</h1>
    <ul class="todo-list">
        <li class="sub-item">
            <input type="checkbox" id="checkbox">
            <label for="checkbox">Explore gaming keyboards</label>
            <ul class="sub-item">
                <li><a class="sub-item-link" target="_blank" href="https://www.google.com"">Store link</a></li>
            </ul>
        </li>
        <li class="sub-item">
            <input type="checkbox" id="checkbox">
            <label for="checkbox"> Finish the report</label>
             <ul class="sub-item">
                 <li><a class="sub-item-link" target="_blank" href="https://www.google.com"">Request Access</a></li>
             </ul>
        </li>
        <li class="sub-item">
            <input type="checkbox" id="checkbox">
            <label for="checkbox">View Phone's Warranty</label>
             <ul class="sub-item">
                 <li><a class="sub-item-link" target="_blank" href="https://www.google.com"">View Receipts</a></li>
             </ul>
        </li>
        <li class="sub-item">
            <input type="checkbox" id="checkbox">
            <label for="checkbox">Check Processor Specs</label>
            <ul class="sub-item">
                <li><a class="sub-item-link" target="_blank" href="https://www.google.com"">View Model Number</a></li>
            </ul>
        </li>
    </ul>
</body>

</html>
