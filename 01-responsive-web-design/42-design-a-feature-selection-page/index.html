<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selection Feature Page</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <h1>Feature Selection</h1>

    <div class="feature-card-container">
      <label class="feature-card">
        <span class="feature-title">Cloud Storage</span>
        <span class="feature-desc">100 GB secure storage</span>
        <input type="checkbox" name="feature" value="cloud-storage" />
      </label>

      <label class="feature-card">
        <span class="feature-title">Dedicated Support</span>
        <span class="feature-desc">24/7 help from a specialist</span>
        <input type="checkbox" name="feature" value="support" />
      </label>

      <label class="feature-card">
        <span class="feature-title">Advanced Analytics</span>
        <span class="feature-desc">Insights & reports</span>
        <input type="checkbox" name="feature" value="analytics" />
      </label>

      <label class="feature-card">
        <span class="feature-title">Custom Themes</span>
        <span class="feature-desc">Personalized dashboard UI</span>
        <input type="checkbox" name="feature" value="themes" />
      </label>

      <label class="feature-card">
        <span class="feature-title">Team Collaboration</span>
        <span class="feature-desc">Share with your team</span>
        <input type="checkbox" name="feature" value="collab" />
      </label>

      <label class="feature-card">
        <span class="feature-title">API Access</span>
        <span class="feature-desc">Integrate with your tools</span>
        <input type="checkbox" name="feature" value="api" />
      </label>
    </div>
  </body>
</html>
